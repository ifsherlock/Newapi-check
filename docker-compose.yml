services:
  newapi-checkin:
    image: ghcr.io/ifsherlock/newapi-checkin:full
    container_name: newapi-checkin
    restart: unless-stopped
    ports:
      - "3211:3211"
    volumes:
      - ./data:/app/data
      # Mount external Chromium browser (shared with other containers)
      - /path/to/your/chromium:/opt/browser:ro
    environment:
      - NODE_ENV=production
      - PORT=3211
      - TZ=Asia/Shanghai
      - PUPPETEER_EXECUTABLE_PATH=/opt/browser/chrome
      # - ENCRYPT_KEY=your-custom-key-here
